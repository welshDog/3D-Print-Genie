name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r service/requirements.txt
          pip install -r mcp/requirements.txt
          pip install pytest

      - name: Byte-compile (catch broken imports before they hit the Pi)
        run: python -m py_compile service/app/*.py mcp/server.py spikes/probe_anycubic.py

      - name: Run smoke tests
        run: pytest -q
